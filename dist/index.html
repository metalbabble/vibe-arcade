<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vibe Arcade">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" href="icon.png">
  <title>Vibe Arcade</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
    }

    h1 {
      font-size: 3rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 0 20px #7c3aed, 0 0 60px #7c3aed44;
    }

    h1 span {
      color: #a855f7;
    }

    .subtitle {
      margin-top: 10px;
      color: #666;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 1000px;
    }

    .card {
      background: #13131a;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .card:not(.card--coming-soon):hover {
      border-color: #7c3aed;
      box-shadow: 0 0 20px #7c3aed22;
    }

    .card--coming-soon {
      opacity: 0.45;
    }

    .card-title {
      font-size: 1.4rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
    }

    .card-description {
      font-size: 0.85rem;
      color: #999;
      line-height: 1.6;
      flex: 1;
    }

    .card-controls {
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.05em;
    }

    .card-controls span {
      color: #7c3aed;
      margin-right: 6px;
    }

    .play-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 24px;
      background: transparent;
      border: 1px solid #7c3aed;
      border-radius: 4px;
      color: #a855f7;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      transition: background 0.2s, color 0.2s;
      cursor: pointer;
    }

    .play-btn:hover {
      background: #7c3aed;
      color: #fff;
    }

    .coming-soon-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 24px;
      border: 1px solid #333;
      border-radius: 4px;
      color: #444;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
    }

    footer {
      margin-top: 64px;
      color: #333;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<header>
  <h1>VIBE <span>ARCADE</span></h1>
  <p class="subtitle">SELECT A GAME TO PLAY</p>
</header>

<div class="grid" id="game-grid"></div>

<footer>CLICK OR TAP A GAME TO START</footer>

<script>
  // ─────────────────────────────────────────────────────────────────────────
  // ADDING A NEW GAME
  // 1. Create games/my-game/ with package.json, vite.config.js, index.html,
  //    and src/main.js (see any existing game for the template).
  // 2. Add an entry to the GAMES array below.
  // See README.md for the full guide.
  // ─────────────────────────────────────────────────────────────────────────
  const GAMES = [
    {
      title: 'Brickout (Classic)',
      description: 'Classic brick-breaking action. Bounce the ball to clear every brick before you run out of lives.',
      controls: 'Keyboard: Arrow Keys / Supports Touch',
      path: './brickout/',
    },
    {
      title: 'Brickout Plus',
      description: 'Brick-breaking upgraded with power-ups: grab a wider paddle, multi-ball, laser cannon, sticky paddle, powerball, and more.',
      controls: 'Keyboard: Arrow Keys + Space / Supports Touch',
      path: './brickout-plus/',
    },
    {
      title: 'Pong',
      description: 'The original arcade classic. Face off against an AI opponent and first to 7 wins.',
      controls: 'Keyboard: Arrow Keys or WASD / Supports Touch',
      path: './pong-game/',
    },
    {
      title: 'Roids',
      description: 'Blast the asteroids, survive the void of space for as long as you can!',
      controls: 'Keyboard: Arrow Keys + Space / Supports Touch',
      path: './roids/',
    },
    {
      title: 'Sentry-Pede',
      description: 'A centipede storms downward through a field of mushrooms. Blast every segment of it before it reaches you!',
      controls: 'Keyboard: Arrow Keys + Space / Supports Touch',
      path: './sentra-pede/',
    },
    {
      title: 'Face Invaders',
      description: 'Rows of mean alien faces are closing in. Blast them from your ship before they land on Earth.',
      controls: 'Keyboard: Arrow Keys + Space / Supports Touch',
      path: './face-invaders/',
    },
    {
      title: 'Conflict',
      description: 'Tank combat against a cunning AI. Choose your arena settings, pick a difficulty, and blast the enemy tank before it blasts you — first to 5 hits wins.',
      controls: 'Keyboard: Arrow Keys + Space / Supports Touch',
      path: './conflict/',
    },
    {
      title: 'Porc-Man',
      description: 'Guide your little piggy through a procedurally generated maze. Eat all the dots, grab pink power-ups to go invincible, and devour the ghosts before they catch you!',
      controls: 'Keyboard: Arrow Keys or WASD / Supports Touch',
      path: './porc-man/',
    },
    {
      title: 'Tankzone 3D',
      description: 'First-person 3D tank combat. Choose your difficulty, navigate a procedurally generated arena, and destroy all enemy tanks before they destroy you.',
      controls: 'Keyboard only: WASD + Mouse + Click',
      path: './tankzone3d/',
    },
    {
      title: 'Irate Avians',
      description: 'Launch irate birds from a slingshot at crates stacked with money bags. Topple the crates, send the loot flying, and clear every bag to advance. 100 points per bag claimed!',
      controls: 'Mouse or Touch: drag bird to aim, release to fire',
      path: './irate-avians/',
    },
    {
      title: 'Galaxplorer',
      description: 'Pilot your spacecraft through deep space. Dodge and blast asteroids, collect atoms to restore shields, and see how far into the galaxy you can go.',
      controls: 'Keyboard only: WASD + , / .',
      path: './galaxplorer/',
    },
  ]
  // ─────────────────────────────────────────────────────────────────────────

  const grid = document.getElementById('game-grid')

  GAMES.forEach(game => {
    const available = game.path !== null

    const card = document.createElement('div')
    card.className = 'card' + (available ? '' : ' card--coming-soon')
    card.innerHTML = `
      <div class="card-title">${game.title}</div>
      <div class="card-description">${game.description}</div>
      ${game.controls ? `<div class="card-controls"><span>&#9679;</span>${game.controls}</div>` : ''}
      ${available
        ? `<a class="play-btn" href="${game.path}">&#9654; Play</a>`
        : `<div class="coming-soon-badge">Coming Soon</div>`
      }
    `
    grid.appendChild(card)
  })
</script>

</body>
</html>
